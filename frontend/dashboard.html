<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Raft Dashboard</title>
  <style>
    body { font-family: monospace; background: #111; color: #eee; padding: 20px; }
    h1 { color: #0f0; }
    .node { border: 1px solid #444; padding: 15px; margin: 10px; display: inline-block; width: 180px; border-radius: 8px; vertical-align: top; }
    .LEADER { border-color: #0f0; background: #0a2a0a; }
    .FOLLOWER { border-color: #44f; background: #0a0a2a; }
    .CANDIDATE { border-color: #f80; background: #2a1a00; }
    .OFFLINE { border-color: #f44; background: #1a0a0a; }
    .state { font-size: 18px; font-weight: bold; margin: 5px 0; }
    .LEADER .state { color: #0f0; }
    .FOLLOWER .state { color: #44f; }
    .CANDIDATE .state { color: #f80; }
    .OFFLINE .state { color: #f44; }
    .label { font-size: 11px; color: #888; }
  </style>
</head>
<body>
  <h1>Raft Cluster Dashboard</h1>
  <div id="nodes"></div>
  <p style="color:#555">Auto-refreshes every second</p>
  <script>
    const replicas = [
      { id: 'replica1', port: 3001 },
      { id: 'replica2', port: 3002 },
      { id: 'replica3', port: 3003 },
      { id: 'replica4', port: 3004 },
      { id: 'replica5', port: 3005 }
    ];
    async function fetchStatus(port) {
      try {
        const res = await fetch(`http://localhost:${port}/status`);
        return await res.json();
      } catch(e) { return null; }
    }
    async function refresh() {
      const container = document.getElementById('nodes');
      container.innerHTML = '';
      for (const r of replicas) {
        const data = await fetchStatus(r.port);
        const div = document.createElement('div');
        if (!data) {
          div.className = 'node OFFLINE';
          div.innerHTML = `<div class="label">${r.id}</div><div class="state">OFFLINE</div>`;
        } else {
          div.className = `node ${data.state}`;
          div.innerHTML = `<div class="label">${data.nodeId}</div><div class="state">${data.state}</div><div>Term: <b>${data.term}</b></div><div>Log size: <b>${data.log.length}</b></div><div>Leader: <b>${data.leader || 'none'}</b></div>`;
        }
        container.appendChild(div);
      }
    }
    refresh();
    setInterval(refresh, 1000);
  </script>
</body>
</html>
