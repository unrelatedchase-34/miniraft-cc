services:
  replica1:
    build: ./replica1
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ID=replica1
      - PEERS=http://replica2:3002,http://replica3:3003,http://replica4:3004
    networks:
      - raft-net
  replica2:
    build: ./replica2
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - NODE_ID=replica2
      - PEERS=http://replica1:3001,http://replica3:3003,http://replica4:3004
    networks:
      - raft-net
  replica3:
    build: ./replica3
    ports:
      - "3003:3003"
    environment:
      - PORT=3003
      - NODE_ID=replica3
      - PEERS=http://replica1:3001,http://replica2:3002,http://replica4:3004
    networks:
      - raft-net
  replica4:
    build: ./replica4
    ports:
      - "3004:3004"
    environment:
      - PORT=3004
      - NODE_ID=replica4
      - PEERS=http://replica1:3001,http://replica2:3002,http://replica3:3003
    networks:
      - raft-net
  gateway:
    build: ./gateway
    ports:
      - "8080:8080"
    environment:
      - REPLICAS=http://replica1:3001,http://replica2:3002,http://replica3:3003,http://replica4:3004
    depends_on:
      - replica1
      - replica2
      - replica3
      - replica4
    networks:
      - raft-net
  frontend:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - gateway
    networks:
      - raft-net
networks:
  raft-net:
    driver: bridge
